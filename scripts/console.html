<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Qlik Observability Toolkit — Configuration Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/console.css" />
<script>
  (function () {
    try {
      var t = localStorage.getItem("qot-theme") || "light";
      document.documentElement.setAttribute("data-theme", t === "dark" ? "dark" : "light");
    } catch (_) { document.documentElement.setAttribute("data-theme", "light"); }
  })();
</script>
</head>
<body>
<noscript>This configuration console requires JavaScript.</noscript>
<script>
"use strict";
/* ============================================================================
   Qlik Observability Toolkit — configuration console (live).
   "Signal" design system, wired to the real /api endpoints.
   ========================================================================== */
const ICONS = {
  talend: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 9a5.5 5.5 0 0 0-10.6-1.4A4 4 0 1 0 6 15.5h11a3.5 3.5 0 0 0 .5-6.5z"/></svg>',
  qlik: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m16 16 4 4"/></svg>',
  data: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="6" rx="8" ry="3"/><path d="M4 6v6c0 1.66 3.58 3 8 3s8-1.34 8-3V6"/><path d="M4 12v6c0 1.66 3.58 3 8 3s8-1.34 8-3v-6"/></svg>',
  exporters: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 13h4l2-7 4 14 2-7h4"/></svg>',
  help: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 2.5-3 2.5"/><path d="M12 17h.01"/></svg>',
  about: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 11v5"/><circle cx="12" cy="7.6" r="0.4" fill="currentColor"/></svg>',
  plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>',
  edit: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>',
  trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>',
  check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
  checkCircle: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m8.5 12 2.5 2.5L16 9"/></svg>',
  x: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>',
  xCircle: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m15 9-6 6M9 9l6 6"/></svg>',
  alert: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.3 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.3a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01"/></svg>',
  play: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m6 4 14 8-14 8V4z" fill="currentColor"/></svg>',
  stop: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>',
  refresh: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.6-6.4M21 4v5h-5"/></svg>',
  upload: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M12 3v13M7 8l5-5 5 5"/></svg>',
  eye: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z"/><circle cx="8" cy="8" r="2"/></svg>',
  eyeOff: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 8s2.5-5 7-5 7 5 7 5"/><path d="M3 12 13 4"/></svg>',
  sun: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
  moon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>',
  power: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v9M7 6a8 8 0 1 0 10 0"/></svg>',
  link: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1.5 1.5M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1.5-1.5"/></svg>',
  file: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>',
  shield: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5 3.4 8.6 8 10 4.6-1.4 8-5 8-10V5l-8-3z"/></svg>',
};

const $ = (s, r = document) => r.querySelector(s);
const $$ = (s, r = document) => [...r.querySelectorAll(s)];
const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const api = async (path, opts) => {
  const r = await fetch(path, opts);
  const txt = await r.text();
  let body; try { body = txt ? JSON.parse(txt) : {}; } catch (_) { body = { raw: txt }; }
  if (!r.ok) throw new Error(body.message || body.error || ("HTTP " + r.status));
  return body;
};

const state = { tab: "talend", snap: null };
const regionUrl = (r) => (state.snap.regions.find((x) => x.region === r) || {}).baseUrl || "";

/* ---- toasts ---- */
function toast(kind, msg) {
  const wrap = $("#toasts"); if (!wrap) return;
  const el = document.createElement("div");
  el.className = "toast " + (kind === "ok" ? "ok" : "err");
  el.innerHTML = '<span style="color:var(--' + (kind === "ok" ? "primary" : "err") + ')">' + (kind === "ok" ? ICONS.checkCircle : ICONS.xCircle) + "</span><span>" + esc(msg) + "</span>";
  wrap.appendChild(el);
  setTimeout(() => { el.style.transition = "opacity .3s, transform .3s"; el.style.opacity = "0"; el.style.transform = "translateY(8px)"; setTimeout(() => el.remove(), 300); }, 3000);
}

/* ---- theme ---- */
const getTheme = () => { try { return localStorage.getItem("qot-theme") || "light"; } catch (_) { return "light"; } };
function applyTheme(t) { document.documentElement.setAttribute("data-theme", t); try { localStorage.setItem("qot-theme", t); } catch (_) {} const b = $("#themeToggle"); if (b) b.innerHTML = t === "dark" ? ICONS.sun : ICONS.moon; }
function toggleTheme() { applyTheme(getTheme() === "dark" ? "light" : "dark"); if (state.tab === "about") renderAbout(); }

/* ---- snapshot ---- */
async function loadSnapshot() { state.snap = await api("/api/config"); }

const TABS = [
  { id: "talend", label: "Talend Cloud", icon: "talend", count: () => state.snap.talendTenants.length, title: "Talend Cloud tenants", sub: "Each tenant fans out to the MCP server and the Python exporters. The default is used by clients that don't name one." },
  { id: "qlik", label: "Qlik Cloud", icon: "qlik", count: () => state.snap.qlikTenants.length, title: "Qlik Cloud tenants", sub: "Targets for the QVD exporter (upload) and the Qlik observability tools/exporter (apps, reloads, audit, quota)." },
  { id: "data", label: "Data Products", icon: "data", count: () => null, title: "Data Products", sub: "QVD files in a Qlik tenant's Data Files connection. Trigger an upload or publish a curated catalog entry." },
  { id: "exporters", label: "Exporters", icon: "exporters", count: () => null, title: "Exporters & agents", sub: "Local Python exporters under docker compose, plus headless extractor agents heartbeating from Remote Engine hosts." },
  { id: "help", label: "Help", icon: "help", count: () => null, title: "Help & connections", sub: "Connect the MCP server, open dashboards, export to Datadog & Splunk, and troubleshoot." },
  { id: "about", label: "About", icon: "about", count: () => null, title: "About & appearance", sub: "Resolved config path, OS keyring status, theme, and the danger zone." },
];

/* ---- shell ---- */
function renderShell() {
  const kc = state.snap.keychain || {};
  document.body.innerHTML = `
    <div class="app">
      <aside class="rail">
        <div class="rail__brand">
          <img src="/assets/qlik-logo.svg" alt="Qlik" onerror="this.style.display='none'" />
          <div class="wm"><b>Observability Toolkit</b><span>Configuration console</span></div>
        </div>
        <div class="rail__group-label">Console</div>
        <nav class="rail__nav" id="nav"></nav>
        <div class="rail__spacer"></div>
        <div class="rail__status">
          <div class="row"><span class="k">Bind</span><span class="pill ok" style="padding:1px 8px"><span class="gdot"></span>loopback</span></div>
          <div class="row"><span class="k">Keyring</span><span class="v" style="color:var(--${kc.available ? "ok" : "muted"})">${kc.available ? "available" : "encrypted file"}</span></div>
        </div>
      </aside>
      <div class="main">
        <header class="topbar">
          <div class="topbar__title"><h1 id="pageTitle"></h1><p id="pageSub"></p></div>
          <div class="topbar__spacer"></div>
          <div class="chip" title="Bound to loopback only"><span class="dot"></span><span>127.0.0.1:8788</span></div>
          <div class="chip" title="${esc(state.snap.configPath)}"><span style="color:var(--muted);width:14px;height:14px">${ICONS.file}</span><span class="mono">config.json</span></div>
          <button class="iconbtn" id="themeToggle" title="Toggle theme"></button>
        </header>
        <div class="content"><div id="view"></div></div>
      </div>
    </div>
    <div class="modal-scrim" id="scrim"><div class="modal" id="modal"></div></div>
    <div class="toast-wrap" id="toasts"></div>`;

  $("#nav").innerHTML = TABS.map((t) => `
    <div class="nav-item${t.id === state.tab ? " active" : ""}" data-tab="${t.id}">
      <span class="nav-item__ic">${ICONS[t.icon]}</span>
      <span class="nav-item__label">${t.label}</span>
      ${t.count() != null ? `<span class="nav-item__count">${t.count()}</span>` : ""}
    </div>`).join("");
  $$("#nav .nav-item").forEach((el) => el.addEventListener("click", () => switchTab(el.dataset.tab)));
  $("#themeToggle").addEventListener("click", toggleTheme);
  applyTheme(getTheme());
  renderTab();
}
function switchTab(id) { state.tab = id; $$("#nav .nav-item").forEach((el) => el.classList.toggle("active", el.dataset.tab === id)); renderTab(); }
function refreshNavCounts() { $$("#nav .nav-item").forEach((el) => { const m = TABS.find((t) => t.id === el.dataset.tab); const c = el.querySelector(".nav-item__count"); if (c && m.count() != null) c.textContent = m.count(); }); }
function renderTab() {
  const m = TABS.find((t) => t.id === state.tab);
  $("#pageTitle").textContent = m.title; $("#pageSub").textContent = m.sub;
  const v = $("#view"); v.classList.remove("fade-in"); void v.offsetWidth; v.classList.add("fade-in");
  ({ talend: renderTalend, qlik: renderQlik, data: renderData, exporters: renderExporters, help: renderHelp, about: renderAbout }[state.tab])();
}

/* ---- shared bits ---- */
function storageBadge(s) {
  return s === "keychain"
    ? `<span style="display:inline-flex;align-items:center;gap:6px"><span style="width:14px;height:14px;color:var(--primary)">${ICONS.shield}</span>OS keyring</span>`
    : `<span style="display:inline-flex;align-items:center;gap:6px"><span style="width:14px;height:14px;color:var(--muted)">${ICONS.file}</span>config file</span>`;
}
function tokenSlot(kind, t) {
  const set = kind === "talend" ? t.patSet : t.apiKeySet;
  const hint = kind === "talend" ? t.patHint : t.apiKeyHint;
  if (!set) return `<span style="color:var(--err)">not set</span>`;
  return `<span class="token" data-slot="${kind}:${esc(t.id)}"><span class="mono hint-txt">${esc(hint)}</span>
    <button class="eye" data-act="reveal" data-kind="${kind}" data-id="${esc(t.id)}" title="Reveal">${ICONS.eye}</button></span>`;
}
function emptyState(icon, title, sub) { return `<div class="empty"><div class="ic">${ICONS[icon]}</div><b>${esc(title)}</b><div>${esc(sub)}</div></div>`; }

/* ---- TALEND ---- */
function renderTalend() {
  const rows = state.snap.talendTenants;
  const body = rows.length ? rows.map(talendCard).join("") : emptyState("talend", "No Talend tenants yet", "Add your first tenant to start routing MCP tools and exporters.");
  $("#view").innerHTML = `
    <div class="panel-wrap">
      <div class="sec-head">
        <div class="sec-head__txt"><h2>${rows.length} tenant${rows.length === 1 ? "" : "s"} configured</h2>
          <p>PATs live in the OS keyring or an encrypted/chmod-600 config file. Only observability APIs are offered.</p></div>
        <div class="sec-head__spacer"></div>
        <button class="btn primary" id="addTalend">${ICONS.plus} Add tenant</button>
      </div>${body}
    </div>`;
  $("#addTalend") && $("#addTalend").addEventListener("click", () => openTalendModal(null));
  bindCardActions("talend");
}
function talendCard(t) {
  return `
  <div class="card tcard${t.isDefault ? " default" : ""}">
    <div class="tcard__head">
      <div class="tcard__icon"><img src="/assets/icons/talend-cloud.png" alt="" onerror="this.style.display='none'" /></div>
      <div class="tcard__title"><b>${esc(t.label)}</b><span class="id">${esc(t.id)}</span></div>
      <div class="tcard__spacer"></div>
      <div class="tcard__tags">
        ${t.isDefault ? `<span class="tag primary"><span class="gdot"></span>default</span>` : ""}
        <span class="tag region">${esc(t.region)}</span>
        ${t.urlOverride ? `<span class="tag">custom URL</span>` : ""}
      </div>
    </div>
    <div class="tcard__meta">
      <div class="meta-cell"><span class="lbl">Base URL</span><span class="val"><span class="mono">${esc(t.urlOverride || regionUrl(t.region))}</span></span></div>
      <div class="meta-cell"><span class="lbl">Personal access token</span><span class="val">${tokenSlot("talend", t)}</span></div>
      <div class="meta-cell"><span class="lbl">Storage</span><span class="val">${storageBadge(t.patStorage)}</span></div>
      <div class="meta-cell"><span class="lbl">Observability APIs</span><span class="val">${t.apis && t.apis.length ? `<span class="mono">${t.apis.length} selected</span>` : `<span style="color:var(--muted)">all observability</span>`}</span></div>
    </div>
    <div class="tcard__actions">
      ${!t.isDefault ? `<button class="btn sm" data-act="default" data-id="${esc(t.id)}">Make default</button>` : ""}
      <button class="btn sm" data-act="edit" data-id="${esc(t.id)}">${ICONS.edit} Edit</button>
      <div class="sp"></div>
      <button class="btn sm danger" data-act="delete" data-id="${esc(t.id)}">${ICONS.trash}</button>
    </div>
  </div>`;
}

/* ---- QLIK ---- */
function renderQlik() {
  const rows = state.snap.qlikTenants;
  const body = rows.length ? rows.map(qlikCard).join("") : emptyState("qlik", "No Qlik tenants yet", "Add a tenant URL + API key to enable QVD upload and Qlik observability.");
  $("#view").innerHTML = `
    <div class="panel-wrap">
      <div class="sec-head">
        <div class="sec-head__txt"><h2>${rows.length} tenant${rows.length === 1 ? "" : "s"} configured</h2>
          <p>The default tenant is what the QVD exporter uploads to. A Data Files connection ID is required for uploads.</p></div>
        <div class="sec-head__spacer"></div>
        <button class="btn primary" id="addQlik">${ICONS.plus} Add tenant</button>
      </div>${body}
    </div>`;
  $("#addQlik") && $("#addQlik").addEventListener("click", () => openQlikModal(null));
  bindCardActions("qlik");
}
function qlikCard(t) {
  const connOk = !!t.connectionId;
  const obs = t.observability !== false;
  return `
  <div class="card tcard${t.isDefault ? " default" : ""}">
    <div class="tcard__head">
      <div class="tcard__icon"><img src="/assets/icons/qlik-cloud.png" alt="" onerror="this.style.display='none'" /></div>
      <div class="tcard__title"><b>${esc(t.label)}</b><span class="id">${esc(t.id)}</span></div>
      <div class="tcard__spacer"></div>
      <div class="tcard__tags">
        ${t.isDefault ? `<span class="tag primary"><span class="gdot"></span>default</span>` : ""}
        <span class="pill ${obs ? "ok" : "idle"}"><span class="gdot"></span>obs ${obs ? "on" : "off"}</span>
        ${connOk ? `<span class="tag"><span class="gdot" style="background:var(--ok)"></span>data files</span>` : `<span class="tag" style="color:var(--warn)">no connection</span>`}
      </div>
    </div>
    <div class="tcard__meta">
      <div class="meta-cell"><span class="lbl">Tenant URL</span><span class="val"><span class="mono">${esc(t.tenantUrl)}</span></span></div>
      <div class="meta-cell"><span class="lbl">API key</span><span class="val">${tokenSlot("qlik", t)}</span></div>
      <div class="meta-cell"><span class="lbl">Storage</span><span class="val">${storageBadge(t.apiKeyStorage)}</span></div>
      <div class="meta-cell"><span class="lbl">Data Files connection</span><span class="val">${t.connectionId ? `<span class="mono">${esc(String(t.connectionId).slice(0, 13))}…</span>` : `<span style="color:var(--muted)">— not set —</span>`}</span></div>
    </div>
    <div class="tcard__actions">
      ${!t.isDefault ? `<button class="btn sm" data-act="default" data-id="${esc(t.id)}">Make default</button>` : ""}
      <button class="btn sm" data-act="edit" data-id="${esc(t.id)}">${ICONS.edit} Edit</button>
      <div class="sp"></div>
      <button class="btn sm danger" data-act="delete" data-id="${esc(t.id)}">${ICONS.trash}</button>
    </div>
  </div>`;
}

/* ---- card actions ---- */
function bindCardActions(kind) {
  $$("#view [data-act]").forEach((btn) => btn.addEventListener("click", async () => {
    const act = btn.dataset.act, id = btn.dataset.id;
    const list = kind === "talend" ? state.snap.talendTenants : state.snap.qlikTenants;
    const item = list.find((x) => x.id === id);
    try {
      if (act === "default") {
        await api(`/api/${kind}-tenants/default`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ id }) });
        await loadSnapshot(); renderTab(); toast("ok", `${item.label} is now the default.`);
      } else if (act === "edit") { kind === "talend" ? openTalendModal(item) : openQlikModal(item); }
      else if (act === "delete") { confirmDelete(kind, item); }
      else if (act === "reveal") { revealToken(btn); }
    } catch (e) { toast("err", e.message); }
  }));
}
async function revealToken(btn) {
  const kind = btn.dataset.kind, id = btn.dataset.id, slot = btn.closest(".token"), hintEl = slot.querySelector(".hint-txt");
  if (btn.dataset.shown === "1") { hintEl.outerHTML = `<span class="mono hint-txt">${esc(slot.dataset.hint)}</span>`; btn.dataset.shown = "0"; btn.innerHTML = ICONS.eye; return; }
  try {
    const r = await api(`/api/${kind}-tenants/${encodeURIComponent(id)}/reveal`);
    slot.dataset.hint = hintEl.textContent;
    hintEl.outerHTML = `<span class="revealed hint-txt">${esc(r.token || r.value || "")}</span>`;
    btn.dataset.shown = "1"; btn.innerHTML = ICONS.eyeOff;
    setTimeout(() => { const s = $('.token[data-slot="' + kind + ":" + id + '"] .eye'); if (s && s.dataset.shown === "1") s.click(); }, 30000);
    toast("ok", "Token revealed — auto-hides in 30s.");
  } catch (e) { toast("err", e.message); }
}
function confirmDelete(kind, item) {
  openModal(`
    <div class="modal__head"><div class="mh-ic" style="color:var(--err)">${ICONS.alert}</div>
      <div><h2>Delete ${esc(item.label)}?</h2><p>Removes the tenant and its ${kind === "talend" ? "PAT" : "API key"} from the keyring. Can't be undone.</p></div>
      <button class="iconbtn x" onclick="window.__closeModal()">${ICONS.x}</button></div>
    <div class="modal__body"><div style="padding:13px 15px;border:1px solid var(--border);border-radius:10px;background:var(--surface-2);font-size:12.5px;color:var(--muted)">
      Tenant <span class="mono" style="color:var(--text)">${esc(item.id)}</span> will stop receiving traffic from the MCP server and exporters.</div></div>
    <div class="modal__foot"><div class="sp"></div><button class="btn" onclick="window.__closeModal()">Cancel</button>

/* ---- DATA PRODUCTS ---- */
async function renderData() {
  const tenants = state.snap.qlikTenants;
  if (!state.dpTenant) state.dpTenant = (tenants.find((t) => t.isDefault) || tenants[0] || {}).id;
  const tenant = tenants.find((t) => t.id === state.dpTenant);
  $("#view").innerHTML = `
    <div class="panel-wrap wide">
      <div class="sec-head">
        <div class="sec-head__txt"><h2>QVD files</h2><p>Browse a Qlik tenant's Data Files connection, trigger an immediate exporter run, or publish to the Hub catalog.</p></div>
        <div class="sec-head__spacer"></div>
        <select id="dpTenant" style="width:auto;min-width:210px">${tenants.map((t) => `<option value="${esc(t.id)}"${t.id === state.dpTenant ? " selected" : ""}>${esc(t.label)}</option>`).join("")}</select>
        <button class="btn" id="dpRefresh">${ICONS.refresh} Refresh</button>
        <button class="btn primary" id="dpUpload">${ICONS.upload} Upload now</button>
      </div>
      <div id="dpBody">${tenant ? `<div class="empty"><div class="ic">${ICONS.refresh}</div><b>Loading…</b></div>` : emptyState("qlik", "No Qlik tenant", "Add a Qlik tenant first.")}</div>
    </div>`;
  $("#dpTenant") && $("#dpTenant").addEventListener("change", (e) => { state.dpTenant = e.target.value; renderData(); });
  $("#dpRefresh") && $("#dpRefresh").addEventListener("click", () => loadDpFiles());
  $("#dpUpload") && $("#dpUpload").addEventListener("click", async (e) => {
    const b = e.currentTarget; b.disabled = true; b.innerHTML = `<span class="spin" style="display:inline-flex">${ICONS.refresh}</span> Running exporter`;
    try { await api(`/api/data-products/upload-now?qlik=${encodeURIComponent(state.dpTenant)}`, { method: "POST" }); toast("ok", "QVD exporter run triggered."); await loadDpFiles(); }
    catch (err) { toast("err", err.message); } finally { b.disabled = false; b.innerHTML = `${ICONS.upload} Upload now`; }
  });
  if (tenant) loadDpFiles();
}
async function loadDpFiles() {
  const wrap = $("#dpBody"); if (!wrap) return;
  try {
    const r = await api(`/api/data-products?qlik=${encodeURIComponent(state.dpTenant)}`);
    const files = r.files || r.dataFiles || [];
    if (!r.connectionId && !files.length) { wrap.innerHTML = `<div class="empty"><div class="ic">${ICONS.link}</div><b>No Data Files connection</b><div>Add a connection ID on the Qlik Cloud tab to browse and publish QVD files.</div></div>`; return; }
    const rows = files.map((f) => `
      <tr class="row">
        <td><div class="fname"><span class="fi">${ICONS.file}</span><span class="mono">${esc(f.name)}</span></div></td>
        <td class="num">${esc(f.size != null ? fmtBytes(f.size) : "—")}</td>
        <td style="color:var(--muted)">${esc(f.modified || f.modifiedDate || "")}</td>
        <td class="act"><button class="btn sm" data-dp="publish" data-f="${esc(f.name)}">Publish</button>
          <button class="btn sm danger" data-dp="del" data-f="${esc(f.name)}">${ICONS.trash}</button></td>
      </tr>`).join("");
    wrap.innerHTML = `<div class="tbl-wrap"><table class="tbl"><thead><tr><th>File</th><th style="text-align:right">Size</th><th>Modified</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>
      <p style="font-size:12px;color:var(--muted);margin-top:12px">${files.length} file(s)${r.connectionId ? ` · connection <span class="mono">${esc(String(r.connectionId).slice(0, 18))}…</span>` : ""}</p>`;
    $$("#dpBody [data-dp]").forEach((b) => b.addEventListener("click", async () => {
      try {
        if (b.dataset.dp === "publish") { await api(`/api/data-products/publish?qlik=${encodeURIComponent(state.dpTenant)}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ fileName: b.dataset.f }) }); toast("ok", `Published ${b.dataset.f}.`); }
        else { await api(`/api/data-products/${encodeURIComponent(b.dataset.f)}?qlik=${encodeURIComponent(state.dpTenant)}`, { method: "DELETE" }); toast("ok", `Deleted ${b.dataset.f}.`); }
        loadDpFiles();
      } catch (e) { toast("err", e.message); }
    }));
  } catch (e) { wrap.innerHTML = `<div class="empty"><div class="ic">${ICONS.xCircle}</div><b>Couldn't load files</b><div>${esc(e.message)}</div></div>`; }
}
const fmtBytes = (n) => n < 1024 ? n + " B" : n < 1048576 ? (n / 1024).toFixed(0) + " KB" : (n / 1048576).toFixed(1) + " MB";

  $("#view").innerHTML = `<div class="panel-wrap wide">

async function loadExporters() {
  const grid = $("#expGrid"); if (!grid) return;
  try {
    const r = await api("/api/exporters");
    const list = r.exporters || r.services || (Array.isArray(r) ? r : []);
    grid.innerHTML = list.length ? list.map(exporterCard).join("") : emptyState("exporters", "No exporters", "Bring up the stack with docker compose.");
    $$("#expGrid [data-exp]").forEach((b) => b.addEventListener("click", async () => {
      const svc = b.dataset.exp, start = b.dataset.do === "start";
      b.disabled = true; b.innerHTML = `<span class="spin" style="display:inline-flex">${ICONS.refresh}</span> ${start ? "Starting" : "Stopping"}`;
      try { await api(`/api/exporters/${encodeURIComponent(svc)}/${start ? "start" : "stop"}`, { method: "POST" }); toast("ok", `${svc} ${start ? "started" : "stopped"}.`); }
      catch (e) { toast("err", e.message); } finally { loadExporters(); }
    }));
  } catch (e) { grid.innerHTML = emptyState("exporters", "Couldn't load exporters", e.message); }
}
function exporterCard(e) {
  const running = e.state === "running" || e.running === true || e.status === "running";
  return `<div class="card exp">
    <div class="exp__top"><div class="exp__ic"><img src="/assets/icons/exporters.png" alt="" onerror="this.style.display='none'" /></div>
      <div class="exp__title"><b>${esc(e.label || e.service)}</b><p>${esc(e.description || e.desc || "")}</p></div>
      <span class="pill ${running ? "ok" : "err"}"><span class="gdot"></span>${running ? "running" : "stopped"}</span></div>
    <div class="exp__metrics"><div class="exp__metric"><span class="n">${e.series != null ? e.series : (running ? "live" : "—")}</span><span class="l">active series</span></div>
      <div class="exp__metric"><span class="n mono" style="font-size:13px">:${esc(e.port)}</span><span class="l">/metrics port</span></div></div>
    <div class="exp__foot"><span class="port">${esc(e.service)}</span><div class="sp"></div>
      ${running ? `<button class="btn sm danger" data-exp="${esc(e.service)}" data-do="stop">${ICONS.stop} Stop</button>` : `<button class="btn sm primary" data-exp="${esc(e.service)}" data-do="start">${ICONS.play} Start</button>`}</div></div>`;
}
async function loadAgents() {
  const wrap = $("#agentList"); if (!wrap) return;
  try {
    const r = await api("/api/extractors");
    const list = r.agents || r.extractors || (Array.isArray(r) ? r : []);
    wrap.innerHTML = list.length ? list.map(agentCard).join("") : `<div class="empty"><div class="ic">${ICONS.shield}</div><b>No agents registered</b><div>Install <span class="mono">qlik-engine-extractor</span> on a Remote Engine host; it heartbeats here.</div></div>`;
  } catch (e) { wrap.innerHTML = emptyState("shield", "Couldn't load agents", e.message); }
}
function agentCard(a) {
  const vp = (v) => v === "ok" ? `<span class="pill ok"><span class="gdot"></span>ok</span>` : (v && v.indexOf("no") === 0) || v === "stale" || v === "warn" ? `<span class="pill warn"><span class="gdot"></span>${esc(v)}</span>` : `<span class="pill err"><span class="gdot"></span>${esc(v || "error")}</span>`;
  const diags = (a.diagnostics || []).map((d) => `<div class="diag-row">${vp(d.verdict)}<span class="src">${esc(d.source_name || d.source || "")}</span><span class="det">${esc(d.detail || "")}</span><span class="sp"></span><span class="det mono">${d.file_count != null ? d.file_count + " files" : ""}</span></div>`).join("");
  return `<div class="card agent">
    <div class="agent__top"><div class="tcard__icon"><img src="/assets/icons/extractor.png" alt="" onerror="this.style.display='none'" /></div>
      <div style="flex:1;min-width:0"><div class="agent__host">${esc(a.hostname)}</div>
        <div class="agent__sub"><span class="mono">${esc(a.ip || "")}</span> · ${esc(a.platform || "")} · agent ${esc(a.agentVersion || "?")} · ${esc(a.user || "")}</div></div>
      ${a.stale ? `<span class="pill warn"><span class="gdot"></span>stale</span>` : `<span class="pill ok"><span class="gdot"></span>live</span>`}</div>
    <div class="agent__diag">${diags}</div></div>`;
}

    ${helpNote(`Metrics need no app changes (the collector scrapes the same /metrics). Config: <span class="mono">deploy/otel-collector.yaml</span> · full guide: ${extLink(gh + "/blob/main/docs/otel-export.md", "docs/otel-export.md")}. Using Splunk Enterprise instead? Swap the <span class="mono">signalfx</span> exporter for <span class="mono">splunk_hec</span>.`)}`);

  const grafanaHow = block("Getting to the Grafana dashboards", "From zero to charts in four clicks — no login anywhere.", `
    <div class="kv"><span class="k" style="width:28px;flex:0 0 28px;font-weight:600;color:var(--primary)">1</span><span style="font-size:13px"><b>Start the stack</b> (once): ${codeInline("npm run deploy -- --target docker --profile all")} — wait ~15s for the containers to settle. Already running? Skip ahead.</span></div>
    <div class="kv"><span class="k" style="width:28px;flex:0 0 28px;font-weight:600;color:var(--primary)">2</span><span style="font-size:13px"><b>Open Grafana</b> — ${extLink("http://localhost:3000", "localhost:3000")}. It lands directly on the app: no username, no password, no login form.</span></div>
    <div class="kv"><span class="k" style="width:28px;flex:0 0 28px;font-weight:600;color:var(--primary)">3</span><span style="font-size:13px"><b>Open the dashboard list</b> — left sidebar → <b>Dashboards</b>, or jump straight there: ${extLink("http://localhost:3000/dashboards", "localhost:3000/dashboards")}.</span></div>
    <div class="kv"><span class="k" style="width:28px;flex:0 0 28px;font-weight:600;color:var(--primary)">4</span><span style="font-size:13px"><b>Pick one of the two pre-provisioned dashboards</b>:<br>
      <span style="display:inline-block;margin-top:6px"><b>Qlik Observability Toolkit</b> — MCP server health: request rate, latency, errors, retries, with the matching Loki log stream underneath.<br>
      <b>Talend TMC Business + Engine</b> — what your pipelines are doing: task/plan runs &amp; outcomes, Remote Engine job lifecycle, QVD export health.</span></span></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px">
      <a class="btn primary" href="http://localhost:3000/dashboards" target="_blank" rel="noopener">Open the dashboard list →</a>
      <a class="btn" href="http://localhost:9090/targets" target="_blank" rel="noopener">Check scrape targets</a>
    </div>
    ${helpNote(`Empty charts? Prometheus may still be doing its first scrapes (~15s), or the exporter feeding that panel is stopped — check the <b>Exporters</b> tab here, and ${extLink("http://localhost:9090/targets", "Prometheus → targets")} should show every endpoint <b>UP</b>. The dashboards are provisioned from the repo (<span class="mono">deploy/grafana/dashboards/</span>), so they're there from first boot — nothing to import.`)}`);

  const fixRow = (q, a) => `<div class="kv" style="align-items:flex-start"><span class="k" style="width:230px;flex:0 0 230px;font-weight:600;color:var(--text)">${q}</span><span style="font-size:12.5px;color:var(--muted)">${a}</span></div>`;
  const trouble = block("Troubleshooting", "", `
    ${fixRow("Console didn't come up on :8788", `Port busy — usually a previous instance. The server prints a NOTE with the fallback URL it actually bound; open that, or kill the old <span class="mono">node … config-server</span> process and rerun <span class="mono">npm run config-ui</span>.`)}
    ${fixRow("No Remote Engine metrics", `Run <span class="mono">qlik-engine-extractor doctor</span> on the engine host. It verifies the pickup directory exists and that job-management logging is enabled — the same verdicts shown on the Exporters tab.`)}
    ${fixRow("MCP tools seem to be missing", `The server is observability-scoped by design (8 Talend + meta). Widen with <span class="mono">TMC_APIS_PRESET=logging</span> or an explicit <span class="mono">TMC_APIS</span> list, then restart the MCP client.`)}
    ${fixRow("Qlik tools absent", `Edit the Qlik tenant here and make sure <b>Expose observability tools</b> is checked, then restart the MCP client.`)}
    ${fixRow("Exporter shows stopped", `Start it from the Exporters tab (runs <span class="mono">docker compose --profile … up -d</span>), or check <span class="mono">docker compose ps</span> for the underlying container error.`)}
    ${fixRow("Saved a token but the MCP can't auth", `The MCP server reads credentials at startup — restart your MCP client after changing tenants here.`)}`);

  const refs = block("Reference", "", `
    <div class="kv"><span class="k">Repository</span><span class="v">${extLink(gh, "github.com/robertschoenfeldqlik/QlikObservabilityToolkit")}</span></div>
    <div class="kv"><span class="k">Capabilities</span><span class="v">${extLink(gh + "/blob/main/docs/observability-capabilities.md", "docs/observability-capabilities.md")} — every tool + metric, both clouds</span></div>
    <div class="kv"><span class="k">OTel export</span><span class="v">${extLink(gh + "/blob/main/docs/otel-export.md", "docs/otel-export.md")} — Datadog + Splunk setup</span></div>
    <div class="kv"><span class="k">Talend APIs</span><span class="v">${extLink("https://talend.qlik.dev/apis/", "talend.qlik.dev/apis")}</span></div>
    <div class="kv"><span class="k">Engine job logs</span><span class="v">${extLink("https://help.qlik.com/talend/en-US/remote-engine-user-guide-linux/Cloud/job-management-logs", "help.qlik.com — job-management logs")}</span></div>
    <div class="kv"><span class="k">Qlik Cloud APIs</span><span class="v">${extLink("https://qlik.dev/apis/", "qlik.dev/apis")} · ${extLink("https://qlik.dev/apis/rest/data-files/", "Data Files API")}</span></div>
    <div class="kv"><span class="k">All references</span><span class="v"><span class="mono">HELP.md</span> at the repo root — master index of every external doc</span></div>`, false);

  $("#view").innerHTML = `<div class="panel-wrap">${overview}${quickStart}${stackExplained}${grafanaHow}${dashboards}${connect}${tools}${extractor}${otel}${trouble}${refs}</div>`;
}
const codeInline = (t) => `<span class="mono" style="background:var(--surface-2);border:1px solid var(--border);border-radius:5px;padding:1px 6px;font-size:12px">${esc(t)}</span>`;

/* ---- ABOUT ---- */
function renderAbout() {
  const cur = getTheme(), kc = state.snap.keychain || {};
  $("#view").innerHTML = `<div class="panel-wrap"><div class="about-grid">
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="block"><h3>Configuration</h3><p class="sub">This console reads + writes the file the MCP server consumes on startup.</p>
        <div class="kv"><span class="k">Config path</span><span class="v">${esc(state.snap.configPath)}</span></div>
        <div class="kv"><span class="k">Schema</span><span class="v">v2 · multi-tenant</span></div>
        <div class="kv"><span class="k">Talend tenants</span><span class="v">${state.snap.talendTenants.length}</span></div>
        <div class="kv"><span class="k">Qlik tenants</span><span class="v">${state.snap.qlikTenants.length}</span></div></div>
      <div class="block"><h3>Security</h3><p class="sub">Hardening posture for this local control plane.</p>
        <div class="kv"><span class="k">Bind address</span><span class="v" style="color:var(--ok)">127.0.0.1 only</span></div>
        <div class="kv"><span class="k">OS keyring</span><span class="v" style="color:var(--${kc.available ? "ok" : "muted"})">${kc.available ? "available · " + esc(kc.backend || "") : "encrypted file"}</span></div>
        <div class="kv"><span class="k">CSRF</span><span class="v">loopback origin check</span></div></div></div>
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="block"><h3>Appearance</h3><p class="sub">Theme is stored in this browser only.</p>
        <div class="theme-cards">
          ${themeOpt("light", "Light", cur, ["#F4F6F6", "#009845", "#14181A"])}
          ${themeOpt("dark", "Dark", cur, ["#0C1215", "#15B85F", "#EAF1F2"])}</div></div>
      <div class="block danger-zone"><h3>Danger zone</h3><p class="sub">Irreversible. Use with care.</p>
        <div style="display:flex;flex-direction:column;gap:10px">
          <button class="btn danger" id="nukeAll">${ICONS.trash} Delete all credentials</button>
          <button class="btn" id="shutdownUI">${ICONS.power} Shut down UI</button></div></div></div>
  </div></div>`;
  $$("#view .theme-opt").forEach((el) => el.addEventListener("click", () => { applyTheme(el.dataset.theme); renderAbout(); }));
  $("#nukeAll").addEventListener("click", () => {
    openModal(`<div class="modal__head"><div class="mh-ic" style="color:var(--err)">${ICONS.alert}</div>
      <div><h2>Delete all credentials?</h2><p>Removes every Talend and Qlik tenant from the config + keyring.</p></div>
      <button class="iconbtn x" onclick="window.__closeModal()">${ICONS.x}</button></div>
      <div class="modal__body"><div style="padding:13px 15px;border:1px solid var(--err-border);background:var(--err-bg);border-radius:10px;color:var(--err);font-size:12.5px">${state.snap.talendTenants.length + state.snap.qlikTenants.length} tenants and their secrets will be permanently erased.</div></div>
      <div class="modal__foot"><div class="sp"></div><button class="btn" onclick="window.__closeModal()">Cancel</button><button class="btn danger" id="confirmNuke">Delete everything</button></div>`);
    $("#confirmNuke").addEventListener("click", async () => { try { await api("/api/config", { method: "DELETE" }); closeModal(); await loadSnapshot(); refreshNavCounts(); renderAbout(); toast("ok", "All credentials deleted."); } catch (e) { toast("err", e.message); } });
  });
  $("#shutdownUI").addEventListener("click", async () => { try { await api("/api/shutdown", { method: "POST" }); toast("ok", "Shutdown signal sent."); } catch (e) { toast("ok", "Shutting down…"); } });
}
function themeOpt(val, name, cur, sw) {
  return `<div class="theme-opt${cur === val ? " sel" : ""}" data-theme="${val}"><div class="tname"><span class="rad"></span>${esc(name)}</div>
    <div class="swatches">${sw.map((c) => `<span class="sw" style="background:${c}"></span>`).join("")}</div></div>`;
}

/* ---- MODALS ---- */
function openModal(html) { $("#modal").innerHTML = html; $("#scrim").classList.add("show"); }
function closeModal() { $("#scrim").classList.remove("show"); }
window.__closeModal = closeModal;

function storeOpt(val, title, desc, sel) {
  return `<div class="seg-opt${sel ? " sel" : ""}" data-val="${val}"><span class="rad"></span><div><b>${esc(title)}</b><p>${esc(desc)}</p></div></div>`;
}
function bindStoreSeg() {
  $$(".seg-opt:not(.disabled)").forEach((el) => el.addEventListener("click", () => { $$(".seg-opt", el.parentElement).forEach((o) => o.classList.remove("sel")); el.classList.add("sel"); }));
}

function openTalendModal(existing) {
  const isNew = !existing, e = existing || { id: "", label: "", region: "us", urlOverride: "", patStorage: "keychain", apis: [] };
  const apis = state.snap.availableApis || [];
  openModal(`
    <div class="modal__head"><div class="mh-ic"><img src="/assets/icons/talend-cloud.png" alt="" onerror="this.style.display='none'" /></div>
      <div><h2>${isNew ? "Add Talend tenant" : "Edit " + esc(e.label)}</h2><p>${isNew ? "Connect a Talend Cloud account by region + PAT." : "Tenant ID is immutable."}</p></div>
      <button class="iconbtn x" onclick="window.__closeModal()">${ICONS.x}</button></div>
    <div class="modal__body">
      <div class="grid-2">
        <div class="field"><label>Tenant ID</label><input type="text" class="mono" id="f_id" value="${esc(e.id)}" placeholder="prod-us" ${isNew ? "" : "disabled"} /><div class="hint">Stable routing identifier.</div></div>
        <div class="field"><label>Label</label><input type="text" id="f_label" value="${esc(e.label)}" placeholder="Production · US" /></div></div>
      <div class="grid-2">
        <div class="field"><label>Region</label><select id="f_region">${state.snap.regions.map((r) => `<option value="${r.region}"${r.region === e.region ? " selected" : ""}>${r.region} — ${r.baseUrl.replace("https://", "")}</option>`).join("")}</select></div>
        <div class="field"><label>Custom URL <span style="color:var(--faint);font-weight:400">· optional</span></label><input type="url" class="mono" id="f_url" value="${esc(e.urlOverride || "")}" placeholder="https://api.internal.example.com" /></div></div>
      <div class="field"><label>Personal access token</label>
        <div class="input-group"><input type="password" class="mono" id="f_pat" placeholder="${existing && existing.patSet ? "•••• keep existing token" : "paste PAT"}" /><button class="btn" id="f_testPat">${ICONS.link} Test</button></div>
        <div class="hint">Talend Cloud → Profile preferences → Personal Access Tokens.</div><div class="testbar" id="patTest"></div></div>
      <div class="field"><label>Where to store the token</label><div class="seg" id="f_store">
        ${storeOpt("keychain", "OS keyring", "System credential manager. Recommended.", (e.patStorage || "file") === "keychain")}
        ${storeOpt("file", "Config file", "Encrypted at rest / chmod-600 config file.", (e.patStorage || "file") === "file")}</div></div>
      <div class="field"><label>Observability APIs <span style="color:var(--faint);font-weight:400">· blank = all observability</span></label>
        <div class="api-grid" id="f_apis">${apis.map((a) => `<label class="api-chk"><input type="checkbox" value="${a}"${(e.apis || []).includes(a) ? " checked" : ""}/><span class="nm">${a}</span></label>`).join("")}</div></div>
    </div>
    <div class="modal__foot"><div class="hint">${isNew ? "New tenant" : "Editing"}</div><div class="sp"></div>
      <button class="btn" onclick="window.__closeModal()">Cancel</button><button class="btn primary" id="saveTalend">${ICONS.check} ${isNew ? "Create tenant" : "Save changes"}</button></div>`);
  bindStoreSeg();
  $("#f_testPat").addEventListener("click", () => testTenant("talend", "patTest"));
  $("#saveTalend").addEventListener("click", () => saveTalend(isNew));
}
async function testTenant(kind, barId) {
  const bar = $("#" + barId); bar.className = "testbar show run"; bar.innerHTML = `<span class="spin" style="display:inline-flex">${ICONS.refresh}</span> Contacting endpoint…`;
  try {
    let body, path;
    if (kind === "talend") { body = { pat: $("#f_pat").value.trim(), region: $("#f_region").value, urlOverride: $("#f_url").value.trim() || undefined }; path = "/api/talend-tenants/x/test"; }
    else { body = { apiKey: $("#q_key").value.trim(), tenantUrl: $("#q_url").value.trim() }; path = "/api/qlik-tenants/x/test"; }
    const r = await api(path, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
    bar.className = "testbar show " + (r.ok ? "ok" : "err");
    bar.innerHTML = (r.ok ? ICONS.checkCircle : ICONS.xCircle) + " " + esc(r.message || (r.ok ? "OK" : "Failed"));
  } catch (e) { bar.className = "testbar show err"; bar.innerHTML = ICONS.xCircle + " " + esc(e.message); }
}
async function saveTalend(isNew) {
  const id = $("#f_id").value.trim(); if (!id) return toast("err", "Tenant ID is required.");
  const body = { id, label: $("#f_label").value.trim() || id, region: $("#f_region").value, urlOverride: $("#f_url").value.trim() || undefined,
    pat: $("#f_pat").value.trim() || (isNew ? "" : null), patStorage: $("#f_store .seg-opt.sel").dataset.val,
    apis: $$("#f_apis input:checked").map((c) => c.value), makeDefault: isNew && state.snap.talendTenants.length === 0 };
  if (isNew && !body.pat) return toast("err", "PAT is required for a new tenant.");
  try { const r = await api("/api/talend-tenants", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
    if (r.ok === false) return toast("err", r.message); closeModal(); await loadSnapshot(); refreshNavCounts(); renderTab(); toast("ok", `Saved ${body.label}.`); }
  catch (e) { toast("err", e.message); }
}

function openQlikModal(existing) {
  const isNew = !existing, e = existing || { id: "", label: "", tenantUrl: "", apiKeyStorage: "keychain", connectionId: "", observability: true };
  openModal(`
    <div class="modal__head"><div class="mh-ic"><img src="/assets/icons/qlik-cloud.png" alt="" onerror="this.style.display='none'" /></div>
      <div><h2>${isNew ? "Add Qlik tenant" : "Edit " + esc(e.label)}</h2><p>${isNew ? "Connect a Qlik Cloud tenant by URL + API key." : "Tenant ID is immutable."}</p></div>
      <button class="iconbtn x" onclick="window.__closeModal()">${ICONS.x}</button></div>
    <div class="modal__body">
      <div class="grid-2">
        <div class="field"><label>Tenant ID</label><input type="text" class="mono" id="q_id" value="${esc(e.id)}" placeholder="qlik-prod" ${isNew ? "" : "disabled"} /></div>
        <div class="field"><label>Label</label><input type="text" id="q_label" value="${esc(e.label)}" placeholder="Qlik Cloud · Prod" /></div></div>
      <div class="field"><label>Tenant URL</label><input type="url" class="mono" id="q_url" value="${esc(e.tenantUrl)}" placeholder="https://acme.us.qlikcloud.com" /></div>
      <div class="field"><label>API key</label><div class="input-group"><input type="password" class="mono" id="q_key" placeholder="${existing && existing.apiKeySet ? "•••• keep existing key" : "paste API key"}" /><button class="btn" id="q_testKey">${ICONS.link} Test</button></div>
        <div class="hint">Qlik Cloud → Settings → API keys.</div><div class="testbar" id="keyTest"></div></div>
      <div class="field"><label>Data Files connection ID <span style="color:var(--faint);font-weight:400">· for QVD upload</span></label><input type="text" class="mono" id="q_conn" value="${esc(e.connectionId || "")}" placeholder="9f3c1a72-4b8e-…" /></div>
      <div class="field"><label>Qlik Cloud observability</label>
        <label class="seg-opt sel" style="cursor:default"><input type="checkbox" id="q_obs" ${e.observability !== false ? "checked" : ""} style="width:16px;height:16px;accent-color:var(--primary)"/><div><b>Expose observability tools</b><p>Apps, reloads, audits, quotas as read-only <span class="mono">qlik_observability__*</span> MCP tools + exporter.</p></div></label></div>
      <div class="field"><label>Where to store the API key</label><div class="seg" id="q_store">
        ${storeOpt("keychain", "OS keyring", "System credential manager. Recommended.", (e.apiKeyStorage || "file") === "keychain")}
        ${storeOpt("file", "Config file", "Encrypted at rest / chmod-600 config file.", (e.apiKeyStorage || "file") === "file")}</div></div>
    </div>
    <div class="modal__foot"><div class="sp"></div><button class="btn" onclick="window.__closeModal()">Cancel</button><button class="btn primary" id="saveQlik">${ICONS.check} ${isNew ? "Create tenant" : "Save changes"}</button></div>`);
  bindStoreSeg();
  $("#q_testKey").addEventListener("click", () => testTenant("qlik", "keyTest"));
  $("#saveQlik").addEventListener("click", () => saveQlik(isNew));
}
async function saveQlik(isNew) {
  const id = $("#q_id").value.trim(), url = $("#q_url").value.trim();
  if (!id) return toast("err", "Tenant ID is required."); if (!/^https?:\/\//.test(url)) return toast("err", "Tenant URL must be http(s)://…");
  const body = { id, label: $("#q_label").value.trim() || id, tenantUrl: url, apiKey: $("#q_key").value.trim() || (isNew ? "" : null),
    apiKeyStorage: $("#q_store .seg-opt.sel").dataset.val, connectionId: $("#q_conn").value.trim() || undefined, observability: $("#q_obs").checked, makeDefault: isNew && state.snap.qlikTenants.length === 0 };
  if (isNew && !body.apiKey) return toast("err", "API key is required for a new tenant.");
  try { const r = await api("/api/qlik-tenants", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
    if (r.ok === false) return toast("err", r.message); closeModal(); await loadSnapshot(); refreshNavCounts(); renderTab(); toast("ok", `Saved ${body.label}.`); }
  catch (e) { toast("err", e.message); }
}

document.addEventListener("click", (e) => { if (e.target.id === "scrim") closeModal(); });
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

/* ---- boot ---- */
(async function boot() {
  try { await loadSnapshot(); renderShell(); }
  catch (e) { document.body.innerHTML = '<div style="padding:40px;font-family:sans-serif;color:#b22">Failed to load config: ' + esc(e.message) + "</div>"; }
})();
</script>
</body>
</html>
