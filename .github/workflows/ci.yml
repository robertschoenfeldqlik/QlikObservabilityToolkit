name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-test-build:
    name: Lint, test, build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      # Fetch OpenAPI specs so the build, tests, and docs gen all have what they need.
      - name: Fetch upstream specs
        run: npm run fetch-specs

      - name: ESLint
        run: npm run lint

      - name: Prettier (check)
        run: npm run format:check

      - name: Unit tests
        run: npm test

      - name: TypeScript build
        run: npm run build

      - name: Smoke test (MCP boot + tools/list)
        env:
          SMOKE_FORCE_ENV: "1"
        run: npx tsx scripts/smoke-test.ts

      - name: npm audit (high+critical)
        run: npm audit --audit-level=high

  trivy:
    name: Trivy (image vuln + secret + misconfig)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    needs: lint-test-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run fetch-specs
      - run: npm run build

      - name: Build local image for scanning
        run: docker build -t talend-tmc-mcp:ci .

      # Image scan — fail on HIGH/CRITICAL after .trivyignore filtering.
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: talend-tmc-mcp:ci
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: "1"
          trivyignores: .trivyignore

      # Source scan — Dockerfile/YAML misconfigs and secret leaks.
      - name: Trivy fs scan (misconfig + secret)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: misconfig,secret
          severity: HIGH,CRITICAL
          exit-code: "1"
          trivyignores: .trivyignore

  docker:
    name: Docker build (multi-arch)
    runs-on: ubuntu-latest
    # Don't gate every PR on a multi-arch build — slow and rarely catches anything CI proper doesn't.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: lint-test-build
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          tags: talend-tmc-mcp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: lint-test-build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build & push (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/talend-tmc-mcp:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/talend-tmc-mcp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
