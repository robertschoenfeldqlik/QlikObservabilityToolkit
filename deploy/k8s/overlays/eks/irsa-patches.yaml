# IRSA (IAM Roles for Service Accounts) annotations.
#
# Applied as a strategic-merge patch (see kustomization.yaml) — these
# annotations merge INTO the existing ServiceAccounts created by base/.
#
# Only the ServiceAccounts that actually exist in base/ are patched here:
#
#   tmc-mcp — created by base/mcp-server.yaml. The role lets the MCP
#             server fetch secrets from AWS Secrets Manager (via
#             external-secrets-operator's IRSA, not the MCP's own role),
#             and is in place for any future AWS-aware features.
#
# The Python exporters (business, engine-log-scraper, qvd, qlik-obs) use
# the namespace default ServiceAccount because they only call Talend +
# Qlik APIs over HTTPS using PATs / API keys mounted from a Secret. They
# don't need IRSA. If you add an exporter that calls AWS (e.g. a future
# S3-export variant), add an explicit ServiceAccount to base/ for that
# exporter, then add an entry below.
#
# Replace <ACCOUNT_ID> with your AWS account id before applying. Easiest:
#   kubectl kustomize deploy/k8s/overlays/eks \
#     | sed 's|<ACCOUNT_ID>|123456789012|' | kubectl apply -f -
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tmc-mcp
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/tmc-mcp-eks-role
