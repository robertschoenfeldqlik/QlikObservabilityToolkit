# Pulls the TMC_PAT / QLIK_CLOUD_API_KEY / GRAFANA_ADMIN_PASSWORD secrets
# from AWS Secrets Manager via external-secrets-operator. This REPLACES the
# manually-created `tmc-mcp-secrets` Secret from the base.
#
# Prereqs:
#   - external-secrets-operator installed (`helm install external-secrets
#     external-secrets/external-secrets -n external-secrets --create-namespace`).
#   - The ClusterSecretStore `aws-secretsmanager` exists and uses an IRSA
#     role that can read the secrets below. The trust policy of that role
#     must include the external-secrets ServiceAccount as a federated
#     principal. See: https://external-secrets.io/latest/provider/aws-secrets-manager/
#   - An AWS Secrets Manager secret named `tmc-mcp/<env>` whose JSON value
#     looks like:
#       {
#         "TMC_PAT": "tcp_xxx",
#         "QLIK_CLOUD_API_KEY": "qlik_xxx",
#         "GRAFANA_ADMIN_PASSWORD": "<random>"
#       }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tmc-mcp-secrets
  labels:
    app.kubernetes.io/part-of: talend-tmc-mcp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: tmc-mcp-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: TMC_PAT
      remoteRef:
        key: tmc-mcp/prod
        property: TMC_PAT
    - secretKey: QLIK_CLOUD_API_KEY
      remoteRef:
        key: tmc-mcp/prod
        property: QLIK_CLOUD_API_KEY
    - secretKey: GRAFANA_ADMIN_PASSWORD
      remoteRef:
        key: tmc-mcp/prod
        property: GRAFANA_ADMIN_PASSWORD
