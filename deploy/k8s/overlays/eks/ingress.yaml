# ALB Ingress fronting Grafana.
#
# Requires:
#   - aws-load-balancer-controller (Helm chart `eks/aws-load-balancer-controller`)
#   - An ACM cert for the host (alb.ingress.kubernetes.io/certificate-arn)
#   - Public subnets tagged kubernetes.io/role/elb=1
#
# Replace the placeholder ARN and host.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tmc-mcp-grafana
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:<REGION>:<ACCOUNT_ID>:certificate/<CERT_ID>
    alb.ingress.kubernetes.io/healthcheck-path: /api/health
    alb.ingress.kubernetes.io/healthcheck-port: traffic-port
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/success-codes: "200"
    # Tighten this to your office CIDR / VPN range — internet-facing ALBs
    # left wide open are a recurring eng-on-call topic.
    alb.ingress.kubernetes.io/inbound-cidrs: "0.0.0.0/0"
spec:
  ingressClassName: alb
  rules:
    - host: grafana.tmc.<your-domain>.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
