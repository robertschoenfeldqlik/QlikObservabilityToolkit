# =============================================================================
# DO NOT COMMIT THIS FILE WITH REAL VALUES.
# =============================================================================
#
# This is a TEMPLATE for the Secret consumed by the MCP server and the
# Python exporters. Copy to `secrets.yaml`, fill in the real values, and
# add `secrets.yaml` to .gitignore. Better: don't use this file at all on
# real clusters and instead use one of the following:
#
#   - sealed-secrets (Bitnami)         — git-safe encrypted Secrets
#   - external-secrets-operator + AWS Secrets Manager (used by the EKS overlay)
#   - SOPS-encrypted kustomize generators
#
# The EKS overlay REPLACES this Secret with an ExternalSecret that pulls
# from AWS Secrets Manager via IRSA. See overlays/eks/README.md.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: tmc-mcp-secrets
  labels:
    app.kubernetes.io/part-of: talend-tmc-mcp
type: Opaque
stringData:
  # Talend Cloud Personal Access Token. Required by tmc-mcp + business + engine
  # + qlik-obs exporters.
  TMC_PAT: "REPLACE_ME_tmc_personal_access_token"

  # Optional: Qlik Cloud API key (used by qvd-exporter and qlik-obs-exporter
  # when run in single-tenant mode). For multi-tenant deployments the keys
  # live inside the mounted config.json instead.
  QLIK_CLOUD_API_KEY: "REPLACE_ME_qlik_cloud_api_key"

  # Optional: Grafana admin password. Defaults to "admin" if absent — change it.
  GRAFANA_ADMIN_PASSWORD: "REPLACE_ME_grafana_admin_password"
