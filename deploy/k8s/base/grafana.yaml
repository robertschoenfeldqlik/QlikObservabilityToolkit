---
# Provisioning config for the file-based dashboard provider. Points at the
# directory where the dashboards ConfigMap is mounted.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-providers
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: talend-tmc-mcp
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: "tmc-mcp"
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: talend-tmc-mcp
data:
  # Service DNS names in-cluster: prometheus.talend-tmc-mcp.svc and
  # loki.talend-tmc-mcp.svc — both resolve from short names because
  # Grafana is in the same namespace.
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
        jsonData:
          timeInterval: 10s
          httpMethod: POST
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
        editable: false
        jsonData:
          maxLines: 1000
          derivedFields:
            - name: requestId
              matcherRegex: '"requestId":"([0-9a-f]{8})"'
              url: '/explore?orgId=1&left={"datasource":"Loki","queries":[{"expr":"{service=\"tmc-mcp\"} | json | requestId=\"${__value.raw}\""}],"range":{"from":"now-1h","to":"now"}}'
---
# grafana-dashboards ConfigMap is generated by the base kustomization
# (configMapGenerator) from the JSON files under deploy/grafana/dashboards/
# so we don't have to duplicate ~600 lines of dashboard JSON in YAML.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: dashboards
    app.kubernetes.io/part-of: talend-tmc-mcp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/component: dashboards
        app.kubernetes.io/part-of: talend-tmc-mcp
        logging: promtail
        service: grafana
    spec:
      securityContext:
        # grafana/grafana runs as uid 472.
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:12.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tmc-mcp-secrets
                  key: GRAFANA_ADMIN_PASSWORD
                  optional: true
            - name: GF_USERS_DEFAULT_THEME
              value: "dark"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_FEATURE_TOGGLES_ENABLE
              value: "publicDashboards"
            # Anonymous PVC-less mode: grafana keeps its sqlite DB in an
            # emptyDir. Sufficient because dashboards + datasources are
            # provisioned from ConfigMaps; only thing lost on restart is
            # user-created Grafana state (alerts, starred dashboards).
            # Add a PVC in an overlay if that matters.
            - name: GF_PATHS_DATA
              value: "/var/lib/grafana/data"
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: providers
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
            - name: data
              mountPath: /var/lib/grafana/data
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: providers
          configMap:
            name: grafana-providers
        - name: dashboards
          configMap:
            name: grafana-dashboards
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: dashboards
    app.kubernetes.io/part-of: talend-tmc-mcp
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
