---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels:
    app.kubernetes.io/part-of: talend-tmc-mcp
data:
  # Adapted from deploy/prometheus.yml — the static_configs targets are
  # rewritten to use in-cluster DNS (service.namespace.svc.cluster.local
  # collapses to just `service` when the scraper lives in the same
  # namespace).
  prometheus.yml: |
    global:
      scrape_interval: 10s
      evaluation_interval: 10s
      external_labels:
        monitor: tmc-mcp

    scrape_configs:
      - job_name: tmc-mcp
        metrics_path: /metrics
        static_configs:
          - targets: ["tmc-mcp:9464"]
            labels:
              service: tmc-mcp
              env: k8s

      - job_name: business-exporter
        metrics_path: /metrics
        static_configs:
          - targets: ["business-exporter:9465"]
            labels:
              service: tmc-business-exporter
              env: k8s

      - job_name: engine-log-scraper
        metrics_path: /metrics
        static_configs:
          - targets: ["engine-log-scraper:9466"]
            labels:
              service: tmc-engine-log-scraper
              env: k8s

      - job_name: qvd-exporter
        metrics_path: /metrics
        static_configs:
          - targets: ["qvd-exporter:9467"]
            labels:
              service: tmc-qvd-exporter
              env: k8s

      - job_name: qlik-obs-exporter
        metrics_path: /metrics
        static_configs:
          - targets: ["qlik-obs-exporter:9468"]
            labels:
              service: tmc-qlik-obs-exporter
              env: k8s

      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  labels:
    app.kubernetes.io/part-of: talend-tmc-mcp
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: tsdb
    app.kubernetes.io/part-of: talend-tmc-mcp
spec:
  # Single replica — tsdb storage is a PVC and Prometheus does not support
  # multi-writer access to the same data dir. For HA, switch to Thanos or
  # the Prometheus Operator.
  replicas: 1
  strategy:
    # PVC is RWO; rolling update would block on it. Recreate is correct.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/component: tsdb
        app.kubernetes.io/part-of: talend-tmc-mcp
        logging: promtail
        service: prometheus
    spec:
      securityContext:
        # prom/prometheus runs as uid 65534 (nobody) by default.
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v3.5.0
          imagePullPolicy: IfNotPresent
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=14d"
            - "--web.enable-lifecycle"
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: talend-tmc-mcp
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
      protocol: TCP
