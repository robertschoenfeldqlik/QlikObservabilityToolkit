apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 10s
      httpMethod: POST

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000
      # Derived field: pull the requestId out of any log line and offer to jump
      # to all logs sharing that ID. Lets you click a slow tool call in
      # Prometheus and pivot straight to its log stream.
      derivedFields:
        - name: requestId
          matcherRegex: '"requestId":"([0-9a-f]{8})"'
          url: '/explore?orgId=1&left={"datasource":"Loki","queries":[{"expr":"{service=\"tmc-mcp\"} | json | requestId=\"${__value.raw}\""}],"range":{"from":"now-1h","to":"now"}}'
