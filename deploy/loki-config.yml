# Minimal single-binary Loki config — perfect for a single-node observability
# stack run alongside the MCP server. Don't ship this to production; see
# https://grafana.com/docs/loki/latest/configure/ for HA layouts.
auth_enabled: false

server:
  http_listen_port: 3100
  log_level: warn

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  metric_aggregation_enabled: true
  allow_structured_metadata: true
  retention_period: 168h        # 7 days

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

# Use the new ruler API to keep the deprecated boltdb_shipper warnings quiet.
ruler:
  alertmanager_url: http://localhost:9093
